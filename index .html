<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Tour Overlay</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Montserrat:wght@400;500;600&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bar-height: 126px;
      --bar-side-pad: 34px;
      --bar-bottom: 0px;

      --agent-script-size: 33px;
      --team-size: 15px;

      --address-size: 25px;
      --details-size: 21px;

      --logo-height: 92px;
      --divider-width: 2px;
      --divider-height: 74px;

      --glass-bg: rgba(20, 20, 20, 0.34);
      --glass-border: rgba(255, 255, 255, 0.14);
      --text-main: rgba(255, 255, 255, 0.98);
      --text-soft: rgba(255, 255, 255, 0.92);
      --gold: #c9a24d;

      --blur-amount: 12px;
      --shadow: 0 2px 10px rgba(0, 0, 0, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    body {
      font-family: "Montserrat", Arial, sans-serif;
      color: var(--text-main);
    }

    .overlay-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .bar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: var(--bar-bottom);
      height: var(--bar-height);

      display: grid;
      grid-template-columns: auto 2px 1fr auto;
      align-items: center;
      column-gap: 26px;

      padding: 0 var(--bar-side-pad);

      background: var(--glass-bg);
      backdrop-filter: blur(var(--blur-amount));
      -webkit-backdrop-filter: blur(var(--blur-amount));
      border-top: 1px solid var(--glass-border);
      box-shadow: var(--shadow);
    }

    .left-block {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 220px;
      line-height: 1;
    }

    .agent-name {
      font-family: "Allura", cursive;
      font-size: var(--agent-script-size);
      color: var(--text-main);
      line-height: 0.95;
      margin: 0 0 3px 0;
      white-space: nowrap;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.22);
    }

    .team-name {
      font-family: "Cormorant Garamond", serif;
      font-size: var(--team-size);
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin: 0;
      white-space: nowrap;
    }

    .divider {
      width: var(--divider-width);
      height: var(--divider-height);
      background: var(--gold);
      border-radius: 2px;
      align-self: center;
      opacity: 0.95;
    }

    .center-block {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
      gap: 8px;
    }

    .address-line {
      font-size: var(--address-size);
      font-weight: 500;
      color: var(--text-main);
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
    }

    .details-line {
      font-size: var(--details-size);
      font-weight: 500;
      color: var(--text-soft);
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
    }

    .right-block {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-width: 220px;
    }

    .logo {
      height: var(--logo-height);
      width: auto;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 1px 4px rgba(0, 0, 0, 0.18));
    }
  </style>
</head>
<body>
  <div class="overlay-wrap">
    <div class="bar">
      <div class="left-block">
        <div class="agent-name">Jennifer & Steve</div>
        <div class="team-name">The Namie Group</div>
      </div>

      <div class="divider"></div>

      <div class="center-block">
        <div class="address-line">742 River Ridge Drive • Decatur, AL</div>
        <div class="details-line">3,140 Sq Ft • 4 Beds • 3 Baths • Offered at $525,000</div>
      </div>

      <div class="right-block">
        <img src="LEREG FOR OVERLAY.png" alt="Leading Edge Real Estate Group logo" class="logo" />
      </div>
    </div>
  </div>
</body>
</html>
