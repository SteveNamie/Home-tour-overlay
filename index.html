<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Tour Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet">

<style>

html, body{
margin:0;
width:100%;
height:100%;
background:transparent;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
}

/* =========================
   OVERLAY BAR
========================= */

.bar{

position:fixed;
left:50%;
transform:translateX(-50%);
bottom:4%;

width:86%;
max-width:1050px;

height:60px;

background:rgba(25,25,25,.22);

-webkit-backdrop-filter:blur(8px);
backdrop-filter:blur(8px);

border:1px solid rgba(255,255,255,.04);
border-radius: 10px;
display:grid;
grid-template-columns:180px 2px 1fr 120px;
align-items:center;

column-gap:14px;
padding:0 16px;
box-sizing:border-box;

color:white;
}

/* LEFT SIDE */

.left{
display:flex;
flex-direction:column;
line-height:1;
}

.name{
font-family:'Allura', cursive;
font-size:19px;
white-space:nowrap;
}

.team{
font-size:8px;
letter-spacing:.08em;
margin-top:1px;
white-space:nowrap;
}

.brokerage{
  font-size:7px;
  opacity:0.85;
  letter-spacing:.05em;
  margin-top:1px;
  white-space:nowrap;
}
/* DIVIDER */

.divider{
width:2px;
height:32px;
background:#c9a24d;
}

/* CENTER TEXT */

.center{
display:flex;
flex-direction:column;
justify-content:center;
min-width:0;
}

.address{
font-size:13px;
font-weight:500;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.details{
font-size:10px;
margin-top:2px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
color:rgba(255,255,255,.92);
}

/* LOGO */

.right{
display:flex;
justify-content:flex-end;
align-items:center;
}

.right img{
max-height:48px;
max-width:132px;
object-fit:contain;
}

/* =========================
   EDIT HOUSE DETAILS HERE
========================= */

</style>

</head>

<body>

<div class="bar">

<div class="left">
  <div class="name">Jennifer & Steve Namie</div>
  <div class="team">THE NAMIE GROUP</div>
  <div class="brokerage">@ Leading Edge Real Estate Group</div>
</div>

<div class="divider"></div>

<div class="center">
<div class="address" id="addressLine"></div>
<div class="details" id="detailsLine"></div>
</div>

<div class="right">
<img src="leadingedge.png">
</div>

</div>

<script>

/* EDIT ONLY THESE VALUES */

const streetAddress = "123 Test St";
const cityState = "Addison, AL";
const beds = "3 Beds";
const baths = "2 Baths";
const sqft = "1,189 Sq Ft";
const offerPrice = "$164,900";

/* DO NOT EDIT BELOW */

document.getElementById("addressLine").textContent =
`${streetAddress} • ${cityState}`;

document.getElementById("detailsLine").textContent =
`${sqft} • ${beds} • ${baths} • Offered at ${offerPrice}`;

</script>

</body>
</html>
