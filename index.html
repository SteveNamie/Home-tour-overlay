<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Tour Overlay Test</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 100px;
      background: rgba(0,0,0,0.55);
      color: white;
      display: grid;
      grid-template-columns: 260px 2px 1fr 240px;
      align-items: center;
      column-gap: 24px;
      padding: 0 28px;
      box-sizing: border-box;
    }

    .left {
      line-height: 1.1;
    }

    .name {
      font-size: 28px;
      font-weight: 600;
    }

    .team {
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.9;
    }

    .divider {
      width: 2px;
      height: 64px;
      background: #c9a24d;
    }

    .center {
      line-height: 1.2;
    }

    .address {
      font-size: 24px;
      font-weight: 500;
      white-space: nowrap;
    }

    .details {
      font-size: 20px;
      white-space: nowrap;
      opacity: 0.92;
      margin-top: 6px;
    }

    .right {
      text-align: right;
    }

    .right img {
      max-height: 78px;
      width: auto;
    }
  </style>
</head>
<body>
  <div class="bar">
    <div class="left">
      <div class="name">Jennifer &amp; Steve</div>
      <div class="team">The Namie Group</div>
    </div>

    <div class="divider"></div>

    <div class="center">
      <div class="address">742 River Ridge Drive • Decatur, AL</div>
      <div class="details">3,140 Sq Ft • 4 Beds • 3 Baths • Offered at $525,000</div>
    </div>

    <div class="right">
      <img src="LEREG%20FOR%20OVERLAY.png" alt="Leading Edge Logo">
    </div>
  </div>
</body>
</html>
