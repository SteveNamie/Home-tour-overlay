<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Tour Overlay</title>

  <link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    .bar {
      position: fixed;
      left: 7%;
      right: 7%;
      bottom: 4%;
      height: 68px;
      background: rgba(20, 20, 20, 0.54);
      display: grid;
      grid-template-columns: 190px 2px 1fr 125px;
      align-items: center;
      column-gap: 14px;
      padding: 0 16px;
      box-sizing: border-box;
      color: white;
    }

    .left {
      display: flex;
      flex-direction: column;
      line-height: 1;
      min-width: 0;
    }

    .name {
      font-family: 'Allura', cursive;
      font-size: 20px;
      color: white;
      white-space: nowrap;
    }

    .team {
      font-size: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      margin-top: 1px;
      white-space: nowrap;
    }

    .divider {
      width: 2px;
      height: 36px;
      background: #c9a24d;
    }

    .center {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .address {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .details {
      font-size: 11px;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: rgba(255,255,255,0.92);
    }

    .right {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      min-width: 0;
    }

    .right img {
      max-height: 42px;
      max-width: 115px;
      width: auto;
      height: auto;
      display: block;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="bar">
    <div class="left">
      <div class="name">Jennifer &amp; Steve</div>
      <div class="team">The Namie Group</div>
    </div>

    <div class="divider"></div>

    <div class="center">
      <div class="address" id="addressLine"></div>
      <div class="details" id="detailsLine"></div>
    </div>

    <div class="right">
      <img src="leadingedge.png" alt="Leading Edge Logo">
    </div>
  </div>

  <script>
    /* =========================
       ONLY EDIT THESE VALUES
    ========================= */

    const streetAddress = "742 River Ridge Drive";
    const cityState = "Decatur, AL";
    const beds = "4 Beds";
    const baths = "3 Baths";
    const sqft = "3,140 Sq Ft";
    const offerPrice = "$525,000";

    /* =========================
       DO NOT EDIT BELOW
    ========================= */

    document.getElementById("addressLine").textContent =
      `${streetAddress} • ${cityState}`;

    document.getElementById("detailsLine").textContent =
      `${sqft} • ${beds} • ${baths} • Offered at ${offerPrice}`;
  </script>
</body>
</html>
